  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

  .ctrl {
    display: flex; align-items: center; gap: 5px; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; font-size: 12px; user-select: none;
    transition: opacity .15s; border: 1px solid transparent; color: var(--text);
  }
  .ctrl:hover { border-color: var(--border); }
  .ctrl.off { opacity: .25; }
  .ctrl-dot { width: 10px; height: 10px; border-radius: 50%; }
  .ctrl-count { color: var(--text2); font-size: 11px; }
  .ctrl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }
  .ctrl:not(.off).scale-active { border-color: var(--border); }

  .timeline-wrap { position: relative; width: 100%; height: calc(100vh - 110px); overflow: hidden; cursor: grab; }
  .timeline-wrap:active { cursor: grabbing; }

  canvas { display: block; }

  /* Tooltip */
  .tip {
    position: fixed; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; max-width: 380px; z-index: 9999;
    pointer-events: none; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.5); font-size: 13px;
  }
  .tip-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .tip-badge { padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .tip-hash { font-family: 'Cascadia Code','Fira Code',monospace; font-size: 11px; color: var(--text2); }
  .tip-time { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .tip-msg { color: var(--text); line-height: 1.4; }
  .tip-ver { margin-top: 6px; color: #3b82f6; font-weight: 600; font-size: 12px; }

  .zoom-hint { position: absolute; bottom: 12px; right: 20px; font-size: 11px; color: var(--text2); pointer-events: none; }
</style>

const TYPES={
  feat:{l:'Feature',c:'#3b82f6'},fix:{l:'Bug Fix',c:'#ef4444'},chore:{l:'Chore',c:'#6b7280'},
  docs:{l:'Docs',c:'#22c55e'},refactor:{l:'Refactor',c:'#a855f7'},test:{l:'Test',c:'#14b8a6'},
  ci:{l:'CI',c:'#eab308'}
};

// --- Scale definitions ---
const HOUR = 3600000;
const DAY = 86400000;
const WEEK = 7 * DAY;
const SCALES = [
  { id: '6h',   label: '6 Hours', interval: 6 * HOUR },
  { id: '1d',   label: '1 Day',   interval: DAY },
  { id: '1w',   label: '1 Week',  interval: WEEK },
  { id: '1mo',  label: '1 Month', interval: null }, // special handling
];
let currentScale = '1d';

function getScaleTicks(vStart, vEnd) {
  const scale = SCALES.find(s => s.id === currentScale);
  const ticks = [];

  if (scale.id === '1mo') {
    // Month boundaries
    let d = new Date(vStart);
    d = new Date(d.getFullYear(), d.getMonth(), 1);
    while (d.getTime() <= vEnd + 31 * DAY) {
      ticks.push({
        time: d.getTime(),
        label: d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
      });
      d = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    }
    return ticks;
  }

  const interval = scale.interval;
  // Align start to interval boundary
  let t = Math.floor((vStart - DAY) / interval) * interval;
  // For sub-day, align to a nice boundary from midnight
  if (scale.id === '6h') {
    const base = new Date(vStart);
    base.setHours(0, 0, 0, 0);
    t = base.getTime();
    while (t < vStart - interval) t += interval;
  }

  while (t <= vEnd + interval) {
    const d = new Date(t);
    let label;
    if (scale.id === '6h') {
      label = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', hour12: true });
    } else if (scale.id === '1d') {
      label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } else if (scale.id === '1w') {
      label = 'W' + getWeekLabel(d) + ' ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    // Skip labels that would overlap (too many on screen)
    const pixPerTick = (W - 80) / ((vEnd - vStart) / interval);
    if (pixPerTick < 50) {
      // Thin out: only show every Nth
      const idx = ticks.length;
      const skip = Math.ceil(50 / pixPerTick);
      ticks.push({ time: t, label: (idx % skip === 0) ? label : null });
    } else {
      ticks.push({ time: t, label });
    }
    t += interval;
  }
  return ticks;
}

function getWeekLabel(d) {
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - start) / DAY + start.getDay() + 1) / 7);
}

// --- State ---
const active = new Set(Object.keys(TYPES));
const tMin = new Date('2026-02-19T00:00').getTime();
const tMax = new Date('2026-03-10T00:00').getTime();
let viewStart = tMin;
let viewEnd = tMax;

const wrap = document.getElementById('wrap');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tip');
const dpr = window.devicePixelRatio || 1;

let W, H;
function resize() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

// --- Coordinate helpers ---
function timeToX(t) {
  return 60 + (t - viewStart) / (viewEnd - viewStart) * (W - 80);
}
function xToTime(x) {
  return viewStart + (x - 60) / (W - 80) * (viewEnd - viewStart);
}

// --- Filtered commits ---
function visibleCommits() {
  return COMMITS.filter(c => active.has(c.t));
}

// --- Drawing ---
function getThemeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    bg: s.getPropertyValue('--bg').trim(),
    axis: s.getPropertyValue('--grid').trim(),
    tickLine: s.getPropertyValue('--axis').trim(),
    tickText: s.getPropertyValue('--tick').trim(),
  };
}

function draw() {
  const theme = getThemeColors();
  ctx.clearRect(0, 0, W, H);
  const midY = H / 2;
  const commits = visibleCommits();

  // Axis line
  ctx.strokeStyle = theme.axis;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(60, midY);
  ctx.lineTo(W - 20, midY);
  ctx.stroke();

  // Date ticks based on current scale
  ctx.fillStyle = theme.tickText;
  ctx.font = '11px system-ui, sans-serif';
  ctx.textAlign = 'center';

  const ticks = getScaleTicks(viewStart, viewEnd);
  for (const { time, label } of ticks) {
    const x = timeToX(time);
    if (x < 55 || x > W - 15) continue;
    ctx.strokeStyle = theme.tickLine;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, midY - 8);
    ctx.lineTo(x, midY + 8);
    ctx.stroke();
    if (showDates && label) {
      ctx.fillStyle = theme.tickText;
      ctx.fillText(label, x, midY + 24);
    }
  }

  // Version markers
  const versionCommits = commits.filter(c => c.v);
  ctx.font = 'bold 9px system-ui, sans-serif';
  ctx.textAlign = 'center';
  for (const c of versionCommits) {
    const t = new Date(c.dt).getTime();
    const x = timeToX(t);
    if (x < 55 || x > W - 15) continue;
    ctx.strokeStyle = 'rgba(59,130,246,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x, midY - 60);
    ctx.lineTo(x, midY - 14);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(59,130,246,0.7)';
    ctx.fillText('v' + c.v, x, midY - 64);
  }

  // Commit dots - spread vertically to avoid overlap
  // Group by proximity on x-axis and stack
  const dotR = 6;
  const sorted = commits.map(c => ({
    ...c,
    ts: new Date(c.dt).getTime(),
    x: timeToX(new Date(c.dt).getTime()),
  })).sort((a, b) => a.ts - b.ts);

  // Stack dots that overlap
  const placed = [];
  for (const c of sorted) {
    let y = midY;
    let dir = -1; // start above
    let step = 0;
    while (true) {
      const collision = placed.some(p =>
        Math.abs(p.x - c.x) < dotR * 2.2 && Math.abs(p.y - y) < dotR * 2.2
      );
      if (!collision) break;
      step++;
      y = midY + dir * step * (dotR * 2.2);
      dir = dir > 0 ? -(dir) : -(dir) + 1 > 0 ? 1 : -1; // alternate above/below
      // Simpler: alternate above and below
      if (step % 2 === 0) {
        y = midY - (Math.ceil(step / 2)) * dotR * 2.2;
      } else {
        y = midY + (Math.ceil(step / 2)) * dotR * 2.2;
      }
    }
    c.y = y;
    placed.push(c);
  }

  // Store for hit testing
  window._dots = placed;

  // Draw dots
  for (const c of placed) {
    const info = TYPES[c.t] || TYPES.chore;
    const r = c.v ? dotR + 2 : dotR;

    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.fillStyle = info.c;
    ctx.fill();

    if (c.v) {
      ctx.strokeStyle = document.documentElement.classList.contains('light') ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

// --- Tooltip ---
let hoveredDot = null;
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dots = window._dots || [];

  let found = null;
  let bestDist = Infinity;
  for (const d of dots) {
    const dist = Math.hypot(d.x - mx, d.y - my);
    const r = d.v ? 8 : 6;
    if (dist < r + 4 && dist < bestDist) {
      bestDist = dist;
      found = d;
    }
  }

  if (found) {
    hoveredDot = found;
    const info = TYPES[found.t] || TYPES.chore;
    tip.innerHTML = `
      <div class="tip-head">
        <div class="tip-badge" style="background:${info.c}22;color:${info.c}">${info.l}</div>
        <div class="tip-hash">#${found.n} &middot; ${found.h}</div>
      </div>
      <div class="tip-time">${found.dt.replace('T',' at ')}</div>
      <div class="tip-msg">${found.m}</div>
      ${found.v ? `<div class="tip-ver">Release v${found.v}</div>` : ''}
    `;
    tip.style.display = 'block';
    let tx = e.clientX + 14, ty = e.clientY - 90;
    if (tx + 380 > window.innerWidth) tx = e.clientX - 394;
    if (ty < 8) ty = e.clientY + 20;
    tip.style.left = tx + 'px';
    tip.style.top = ty + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    hoveredDot = null;
    tip.style.display = 'none';
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
});
canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

// --- Pan & Zoom ---
let isDragging = false;
let dragStartX = 0;
let dragStartView = 0;

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartView = viewStart;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const timePerPx = (viewEnd - viewStart) / (W - 80);
  const dt = -dx * timePerPx;
  const newStart = dragStartView + dt;
  const range = viewEnd - viewStart;
  viewStart = newStart;
  viewEnd = newStart + range;
  draw();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  if (!hoveredDot) canvas.style.cursor = 'grab';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const pivot = xToTime(mx);
  const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
  const minRange = 4 * 3600000;   // 4 hours
  const maxRange = 25 * 86400000; // 25 days

  let newRange = (viewEnd - viewStart) * factor;
  newRange = Math.max(minRange, Math.min(maxRange, newRange));

  const ratio = (pivot - viewStart) / (viewEnd - viewStart);
  viewStart = pivot - ratio * newRange;
  viewEnd = viewStart + newRange;
  draw();
}, { passive: false });

// --- Filter controls ---
const counts = {};
Object.keys(TYPES).forEach(k => counts[k] = 0);
COMMITS.forEach(c => counts[c.t] = (counts[c.t] || 0) + 1);

let showDates = true;

const ctrl = document.getElementById('controls');
ctrl.innerHTML = '<span class="controls-label">Filter:</span>';
Object.entries(TYPES).forEach(([k, v]) => {
  const el = document.createElement('div');
  el.className = 'ctrl';
  el.innerHTML = `<div class="ctrl-dot" style="background:${v.c}"></div>${v.l} <span class="ctrl-count">(${counts[k] || 0})</span>`;
  el.onclick = () => {
    if (active.has(k)) {
      active.delete(k);
      el.classList.add('off');
    } else {
      active.add(k);
      el.classList.remove('off');
    }
    draw();
  };
  ctrl.appendChild(el);
});

// Date labels toggle
const sep = document.createElement('div');
sep.className = 'ctrl-sep';
ctrl.appendChild(sep);

const dateToggle = document.createElement('div');
dateToggle.className = 'ctrl';
dateToggle.innerHTML = '<span class="controls-label" style="margin:0">Dates</span>';
const subtitle = document.getElementById('subtitle');
const scaleEls = []; // collected after creation, toggled by Dates
dateToggle.onclick = () => {
  showDates = !showDates;
  dateToggle.classList.toggle('off', !showDates);
  subtitle.style.display = showDates ? '' : 'none';
  scaleEls.forEach(el => el.style.display = showDates ? '' : 'none');
  draw();
};
ctrl.appendChild(dateToggle);

// Scale toggle buttons
const sep2 = document.createElement('div');
sep2.className = 'ctrl-sep';
scaleEls.push(sep2);
ctrl.appendChild(sep2);

const scaleLabel = document.createElement('span');
scaleLabel.className = 'controls-label';
scaleLabel.textContent = 'Scale:';
scaleEls.push(scaleLabel);
ctrl.appendChild(scaleLabel);

const scaleButtons = {};
SCALES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'ctrl' + (s.id === currentScale ? '' : ' off');
  el.textContent = s.label;
  el.onclick = () => {
    currentScale = s.id;
    Object.values(scaleButtons).forEach(b => b.classList.add('off'));
    el.classList.remove('off');
    // Zoom viewport to show a sensible range for this scale
    const mid = (viewStart + viewEnd) / 2;
    const ranges = { '6h': 2 * DAY, '1d': tMax - tMin, '1w': tMax - tMin, '1mo': tMax - tMin };
    const newRange = ranges[s.id] || (tMax - tMin);
    viewStart = mid - newRange / 2;
    viewEnd = mid + newRange / 2;
    draw();
  };
  scaleButtons[s.id] = el;
  scaleEls.push(el);
  ctrl.appendChild(el);
});

// Theme toggle
const sep3 = document.createElement('div');
sep3.className = 'ctrl-sep';
ctrl.appendChild(sep3);

const themeToggle = document.createElement('div');
themeToggle.className = 'ctrl';
themeToggle.innerHTML = '<span class="controls-label" style="margin:0">Light</span>';
themeToggle.onclick = () => {
  const isLight = document.documentElement.classList.toggle('light');
  themeToggle.querySelector('.controls-label').textContent = isLight ? 'Dark' : 'Light';
  draw();
};
ctrl.appendChild(themeToggle);

// --- Init ---
resize();
</script>
