  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  .header h1 { font-size: 22px; font-weight: 700; }

  .controls { display: flex; gap: 6px; padding: 10px 32px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .controls-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
  .ctrl {
    display: flex; align-items: center; gap: 5px; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; font-size: 12px; user-select: none;
    transition: opacity .15s; border: 1px solid transparent;
  }
  .ctrl:hover { border-color: var(--border); }
  .ctrl.off { opacity: .25; }
  .ctrl-dot { width: 10px; height: 10px; border-radius: 50%; }
  .ctrl-count { color: var(--text2); font-size: 11px; }

  #timeline { width: 100%; height: calc(100vh - 120px); }

  /* vis-timeline dark theme overrides */
  .vis-timeline { border: none !important; background: var(--bg) !important; font-family: inherit !important; }
  .vis-panel.vis-bottom, .vis-panel.vis-center, .vis-panel.vis-top { border-color: var(--border) !important; }
  .vis-time-axis .vis-text { color: var(--text2) !important; font-size: 11px !important; }
  .vis-time-axis .vis-grid.vis-minor { border-color: rgba(71,85,105,.3) !important; }
  .vis-time-axis .vis-grid.vis-major { border-color: rgba(71,85,105,.6) !important; }
  .vis-panel.vis-center { background: var(--bg) !important; }
  .vis-labelset .vis-label { color: var(--text) !important; background: var(--bg2) !important; border-bottom-color: var(--border) !important; font-size: 12px !important; font-weight: 600 !important; }
  .vis-foreground .vis-group { border-bottom-color: var(--border) !important; }
  .vis-item { background: none !important; border: none !important; box-shadow: none !important; }
  .vis-item .vis-item-overflow { overflow: visible !important; }
  .vis-item.vis-box { background: none !important; border: none !important; box-shadow: none !important; }
  .vis-item.vis-box .vis-item-content { padding: 0 !important; display: flex; align-items: center; justify-content: center; }
  .vis-item .vis-item-content { padding: 0 !important; }
  .vis-item.vis-line { display: none !important; }
  .vis-item .vis-dot { display: none !important; }

  /* Custom dot rendering */
  .commit-dot {
    width: 12px; height: 12px; border-radius: 50%;
    display: block; cursor: pointer;
    transition: transform .1s;
    min-width: 12px; min-height: 12px;
  }
  .commit-dot:hover { transform: scale(1.8); }
  .commit-dot.milestone {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.8);
    margin: -2px;
  }

  /* Version marker lines */
  .vis-item.vis-range.version-marker {
    background: rgba(59,130,246,.08) !important;
    border-left: 2px solid var(--feat) !important;
    border-right: none !important;
    border-top: none !important;
    border-bottom: none !important;
  }
  .version-label {
    font-size: 9px; font-weight: 700; color: var(--feat);
    background: rgba(59,130,246,.15); padding: 1px 5px; border-radius: 2px;
    white-space: nowrap;
  }

  /* Tooltip */
  .tip {
    position: fixed; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; max-width: 380px; z-index: 9999;
    pointer-events: none; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.5); font-size: 13px;
  }
  .tip-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .tip-badge { padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
  .tip-hash { font-family: 'Cascadia Code','Fira Code',monospace; font-size: 11px; color: var(--text2); }
  .tip-time { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .tip-msg { color: var(--text); line-height: 1.4; }
  .tip-ver { margin-top: 6px; color: var(--feat); font-weight: 600; font-size: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
</style>

const TYPES={
  feat:{l:'Feature',c:'#3b82f6'},fix:{l:'Bug Fix',c:'#ef4444'},chore:{l:'Chore',c:'#6b7280'},
  docs:{l:'Docs',c:'#22c55e'},refactor:{l:'Refactor',c:'#a855f7'},test:{l:'Test',c:'#14b8a6'},
  ci:{l:'CI',c:'#eab308'}
};

const GROUP_ORDER = ['feat','fix','refactor','docs','chore','test','ci'];

// Build groups (swim lanes by type)
const groups = new vis.DataSet(
  GROUP_ORDER.map(k => ({
    id: k,
    content: `<span style="color:${TYPES[k].c}">${TYPES[k].l}</span>`,
    style: `border-bottom: 2px solid ${TYPES[k].c}22`
  }))
);

// Build items
const items = new vis.DataSet(
  COMMITS.map(c => {
    const info = TYPES[c.t] || TYPES.chore;
    const ms = c.v ? ' milestone' : '';
    return {
      id: c.n,
      group: c.t,
      start: new Date(c.dt),
      type: 'box',
      className: 'commit-item',
      content: `<div class="commit-dot${ms}" style="background:${info.c}"></div>`,
      title: '', // we handle tooltip ourselves
      _data: c
    };
  })
);

// Create timeline
const container = document.getElementById('timeline');
const timeline = new vis.Timeline(container, items, groups, {
  min: new Date('2026-02-19T00:00'),
  max: new Date('2026-03-10T00:00'),
  start: new Date('2026-02-19T00:00'),
  end: new Date('2026-03-10T00:00'),
  zoomMin: 1000 * 60 * 60 * 4,   // 4 hours
  zoomMax: 1000 * 60 * 60 * 24 * 25, // 25 days
  orientation: 'top',
  showCurrentTime: false,
  stack: true,
  margin: { item: { horizontal: 0, vertical: 2 } },
  tooltip: { followMouse: true, delay: 0 },
  verticalScroll: false,
  horizontalScroll: true,
  zoomKey: 'ctrlKey',
});

// Custom tooltip on hover
const tip = document.getElementById('tip');
container.addEventListener('mousemove', (e) => {
  const item = timeline.getEventProperties(e).item;
  if (item) {
    const c = COMMITS.find(x => x.n === item);
    if (c) {
      const info = TYPES[c.t] || TYPES.chore;
      tip.innerHTML = `
        <div class="tip-head">
          <div class="tip-badge" style="background:${info.c}22;color:${info.c}">${info.l}</div>
          <div class="tip-hash">#${c.n} &middot; ${c.h}</div>
        </div>
        <div class="tip-time">${c.dt.replace('T',' at ')}</div>
        <div class="tip-msg">${c.m}</div>
        ${c.v ? `<div class="tip-ver">Release v${c.v}</div>` : ''}
      `;
      tip.style.display = 'block';
      let x = e.clientX + 14, y = e.clientY - 90;
      if (x + 380 > window.innerWidth) x = e.clientX - 394;
      if (y < 8) y = e.clientY + 20;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
      return;
    }
  }
  tip.style.display = 'none';
});
container.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

// Legend / filter controls
const active = new Set(Object.keys(TYPES));
const counts = {};
Object.keys(TYPES).forEach(k => counts[k] = 0);
COMMITS.forEach(c => counts[c.t] = (counts[c.t] || 0) + 1);

const ctrl = document.getElementById('controls');
ctrl.innerHTML = '<span class="controls-label">Filter:</span>';
Object.entries(TYPES).forEach(([k, v]) => {
  const el = document.createElement('div');
  el.className = 'ctrl';
  el.innerHTML = `<div class="ctrl-dot" style="background:${v.c}"></div>${v.l} <span class="ctrl-count">(${counts[k] || 0})</span>`;
  el.onclick = () => {
    if (active.has(k)) {
      active.delete(k);
      el.classList.add('off');
      // Hide items of this type
      const toRemove = COMMITS.filter(c => c.t === k).map(c => c.n);
      items.remove(toRemove);
    } else {
      active.add(k);
      el.classList.remove('off');
      // Re-add items of this type
      const toAdd = COMMITS.filter(c => c.t === k).map(c => {
        const info = TYPES[c.t] || TYPES.chore;
        const ms = c.v ? ' milestone' : '';
        return {
          id: c.n, group: c.t, start: new Date(c.dt), type: 'point',
          className: 'commit-item',
          content: `<div class="commit-dot${ms}" style="background:${info.c}"></div>`,
          _data: c
        };
      });
      items.add(toAdd);
    }
  };
  ctrl.appendChild(el);
});
</script>
